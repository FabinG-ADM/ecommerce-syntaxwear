<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyntaxWear - E-commerce</title>

    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/base.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="/" class="logo" aria-label="SyntaxWear">SyntaxWear</a>
            <nav class="site-nav" role="navigation" aria-label="Navegação principal">
                <ul class="nav-list"></ul>
            </nav>
        </div>
    </header>

    <main id="main">
        <section class="hero" aria-label="Seção hero"></section>

        <section class="categories" aria-label="Categorias de tênis"></section>

        <section class="products-grid" aria-label="Produtos em destaque"></section>
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <div class="contact" aria-label="Informações de contato"></div>
            <div class="footer-links" aria-label="Links do rodapé"></div>
        </div>
    </footer>
</body>
</html>
